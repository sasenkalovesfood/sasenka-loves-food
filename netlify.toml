# Netlify build configuration for Sasenka Loves Food.
#
# What this does:
#   - Runs build.py before publishing, which updates the archive page and homepage
#     to include any new reviews saved via the CMS.
#   - Publishes everything in the repo root as the live site.
#   - Pins Python 3.11 so the build script uses a known version.
#   - Ignores the internal _working folder so it is never deployed.

[build]
  command = "python3 build.py"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

# Netlify deploys everything in the publish folder. The _working folder is
# kept in the repo for reference but should not appear on the live site.
[[redirects]]
  from = "/_working/*"
  to = "/404.html"
  status = 404

# Light touch security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
